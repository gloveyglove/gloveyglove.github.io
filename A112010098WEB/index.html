<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性別平等教育法修法爭議全解析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --ink-light: #3d3d5c; --ink-faint: #7a7a9a; --paper: #faf9f6;
    --accent: #c0392b; --accent-warm: #e67e22; --accent-blue: #2980b9; --rule: #ddd8cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.8; font-size: 15px; }
  .masthead { background: var(--ink); color: #fff; padding: 48px 32px 36px; position: relative; }
  .masthead::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent-warm) 50%, var(--accent-blue) 100%); }
  .headline { font-family: 'Noto Serif TC', serif; font-size: clamp(22px, 4vw, 38px); font-weight: 900; line-height: 1.3; }
  .headline em { color: #e8b04a; font-style: normal; }
  .img-container { width: 100%; overflow: hidden; background: #e8e4dc; }
  .img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-hero { height: 400px; }
  .img-inline { height: 300px; margin: 24px 0; border-radius: 4px; }
  .article-wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
  h2.section-title { font-family: 'Noto Serif TC', serif; font-size: 20px; margin: 40px 0 12px; border-bottom: 2px solid var(--rule); display: flex; align-items: center; gap: 10px; }
  .num { background: var(--accent); color: #fff; font-size: 12px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .chart-section { margin: 48px 0; border: 1px solid var(--rule); background: #fff; }
  .chart-header { background: var(--ink); color: #fff; padding: 12px 20px; font-size: 14px; }
  .chart-tabs { display: flex; background: #f5f3ee; }
  .chart-tab { flex: 1; padding: 12px; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .chart-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: #fff; font-weight: 700; }
  .chart-pane { display: none; padding: 24px; }
  .chart-pane.active { display: block; }
  .bar-track { height: 24px; background: #eee; margin: 10px 0; overflow: hidden; }
  .bar-fill { height: 100%; width: 0; transition: width 1s ease; background: var(--accent); }
  .donut-svg { transform: rotate(-90deg); }
  @media (max-width: 600px) { .img-hero { height: 250px; } }
</style>
</head>
<body>

<div class="masthead">
  <div style="font-size:11px; color:#aaa; margin-bottom:10px;">深度報導・2026年4月15日</div>
  <h1 class="headline">法律施行<em>22年</em>，漏洞仍在<br>《性別平等教育法》修法爭議全解析</h1>
</div>

<div class="img-container img-hero">
  <img src="hero.jpg" alt="多元性別旗幟">
</div>

<div class="article-wrap">
  <p>2026年4月15日，立法院召開修法公聽會，直指《性平法》施行逾22年後的制度缺陷。</p>

  <h2 class="section-title"><span class="num">1</span>強制通報制度傷了誰？</h2>
  <p>現行 24 小時強制通報制度，往往讓學生在未準備好的情況下「被迫出櫃」。</p>

  <div class="img-container img-inline">
    <img src="classroom.jpg" alt="校園空教室">
  </div>

  <div class="chart-section">
    <div class="chart-header">📊 數據分析</div>
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchTab('p1', this)">校園不安全感</button>
      <button class="chart-tab" onclick="switchTab('p3', this)">跨性別困境</button>
    </div>
    <div class="chart-body">
      <div class="chart-pane active" id="p1">
        <p>在校感到不安全的 LGBTQ+ 學生</p>
        <div class="bar-track"><div class="bar-fill" data-pct="46.9" style="background:var(--accent)"></div></div>
        <p>46.9%</p>
      </div>
      <div class="chart-pane" id="p3">
        <div style="text-align:center; position:relative;">
          <svg width="120" height="120" viewBox="0 0 160 160" class="donut-svg">
            <circle cx="80" cy="80" r="60" fill="none" stroke="#eee" stroke-width="20"/>
            <circle id="dc1" cx="80" cy="80" r="60" fill="none" stroke="var(--accent)" stroke-width="20" stroke-dasharray="0 377" style="transition: stroke-dasharray 1s ease;"/>
          </svg>
          <div id="dn1" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-weight:900; font-size:20px; color:var(--accent);">0%</div>
          <p style="margin-top:10px;">60.6% 跨性別學生曾遭騷擾</p>
        </div>
      </div>
    </div>
  </div>

  <h2 class="section-title"><span class="num">2</span>尋求更專業的調查機制</h2>
  <div class="img-container img-inline">
    <img src="meeting.jpg" alt="社群討論會">
  </div>
  <p>民間團體尋求第三方調查機制，讓學校回歸教育本質。</p>
</div>

<script>
  function switchTab(id, btn) {
    document.querySelectorAll('.chart-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if(id==='p1') animateBars();
    if(id==='p3') animateDonut();
  }
  function animateBars() {
    document.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.pct + '%');
  }
  function animateDonut() {
    const target = 60.6;
    const circ = 2 * Math.PI * 60;
    document.getElementById('dc1').style.strokeDasharray = (target/100*circ) + ' ' + circ;
    let curr = 0;
    const itv = setInterval(() => {
      curr += 2;
      if(curr >= target) { curr = target; clearInterval(itv); }
      document.getElementById('dn1').textContent = curr.toFixed(1) + '%';
    }, 30);
  }
  window.onload = animateBars;
</script>
</body>
</html>
